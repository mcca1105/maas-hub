apiVersion: aiox/v1
kind: Squad
metadata:
  name: content-distillery
  displayName: "Content Distillery Squad"
  description: "Transform long YouTube livestreams into 60+ structured content pieces via framework extraction, knowledge distillation, and multi-platform production"
  version: "1.0.0"
  installDate: "2026-03-07"
  author: "jose-amorim"
  status: "active"

spec:
  type: "content-operations"
  category: "content-extraction"
  slashPrefix: "ContentDistillery"
  patternPrefix: "CD"

  purpose:
    headline: "YouTube Livestream → 60+ Content Pieces"
    process:
      - "Ingest: Download video, generate transcript"
      - "Extract: Pull tacit knowledge, frameworks, heuristics, mental models"
      - "Distill: Progressive summarization (5 layers), PARA classification"
      - "Multiply: 4A Framework angles, format variations, idea scoring"
      - "Produce: Platform-specific content, ecosystem calendar, batch production"
      - "Optimize: YouTube-specific optimization (titles, thumbnails, tags)"
    timeline: "1 livestream in, 60+ content pieces out"

  targetUsers:
    - "Content creators"
    - "Thought leaders"
    - "Knowledge architects"
    - "jose-amorim, david"

  agents:
    orchestrator:
      - name: "distillery-chief"
        role: "Pipeline Orchestrator"
        description: "Coordinates the entire content distillery workflow"

    tier_0:
      - name: "tacit-extractor"
        persona: "Cedric Chin"
        expertise: "Tacit knowledge extraction from unstructured content"
      - name: "model-identifier"
        persona: "Shane Parrish"
        expertise: "Mental models and framework identification"

    tier_1:
      - name: "knowledge-architect"
        persona: "Tiago Forte"
        expertise: "Knowledge architecture and PARA methodology"
      - name: "content-atomizer"
        persona: "Gary Vaynerchuk"
        expertise: "Content decomposition and multi-format adaptation"

    tier_2:
      - name: "idea-multiplier"
        persona: "Nicolas Cole & Dickie Bush"
        expertise: "Content multiplication and angle variation"
      - name: "ecosystem-designer"
        persona: "Dan Koe"
        expertise: "Ecosystem design and production workflows"
      - name: "production-ops"
        persona: "Justin Welsh"
        expertise: "Production operations and batch workflows"

    tier_3:
      - name: "youtube-strategist"
        persona: "Paddy Galloway"
        expertise: "YouTube optimization and algorithmic strategy"

  workflows:
    - name: "full-distillery-pipeline"
      description: "End-to-end livestream processing (ingest → produce)"
    - name: "framework-extraction"
      description: "Extract frameworks and mental models only"
    - name: "content-derivation"
      description: "Derive content from existing frameworks"

  tasks:
    - "ingest-youtube"
    - "extract-tacit-knowledge"
    - "identify-frameworks"
    - "progressive-summarize"
    - "build-knowledge-base"
    - "multiply-ideas"
    - "produce-content"
    - "optimize-for-youtube"

  quickStart:
    fullPipeline: "@content-distillery:distillery-chief *distill https://youtube.com/watch?v=VIDEO_ID"
    frameworkExtraction: "@content-distillery:distillery-chief *extract https://youtube.com/watch?v=VIDEO_ID"
    contentDerivation: "@content-distillery:distillery-chief *derive outputs/distillery/SLUG/frameworks.yaml"
    compareFrameworks: "@content-distillery:distillery-chief *compare outputs/distillery/SLUG_A/ outputs/distillery/SLUG_B/"

  tags:
    - content-extraction
    - framework-distillation
    - youtube
    - multi-platform
    - knowledge-management
    - repurposing

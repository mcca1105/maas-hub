# Veto Conditions (Centralized)
veto_conditions:
  config_file: config/veto-conditions.yaml
  enforcement: strict
  categories:
    universal: 5      # Apply to ALL agents
    copy_quality: 6   # Apply to all copy-producing agents
    funnel_logic: 4   # Apply to funnel/CVO work
    research: 3       # Apply before writing
  mandatory_checklists:
    awareness_check: checklists/awareness-stage-checklist.md
    copy_quality: checklists/copy-quality-checklist.md
    pre_launch: checklists/pre-launch-master-checklist.md
    cialdini_audit: checklists/cialdini-principles-checklist.md

# Validation Scripts
validation_scripts:
  awareness_validator:
    path: scripts/validate-awareness-stage.py
    usage: "python squads/direct-response-marketing/scripts/validate-awareness-stage.py --stage <1-5>"
    trigger: "Before writing any copy — confirm awareness stage of target"
    returns: "PASS (exit 0) or FAIL (exit 1) with recommended copy approach"

  cvo_validator:
    path: scripts/validate-cvo-funnel.py
    usage: "python squads/direct-response-marketing/scripts/validate-cvo-funnel.py --funnel <file.yaml>"
    trigger: "Before launching any funnel — validate CVO logic"
    returns: "PASS (exit 0) or FAIL (exit 1) with gap analysis"

  cialdini_validator:
    path: scripts/validate-cialdini.py
    usage: "python squads/direct-response-marketing/scripts/validate-cialdini.py --copy <file.md>"
    trigger: "Before finalizing copy — check principle usage"
    returns: "PASS (exit 0) or WARN (exit 1) with missing principles"

# Dependencies
dependencies:
